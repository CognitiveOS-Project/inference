name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_CPM }}" > ~/.ssh/id_cpm && chmod 600 ~/.ssh/id_cpm
          echo "${{ secrets.SSH_KEY_COGNITIVEOSD }}" > ~/.ssh/id_cogd && chmod 600 ~/.ssh/id_cogd
          echo "${{ secrets.SSH_KEY_CLI }}" > ~/.ssh/id_cli && chmod 600 ~/.ssh/id_cli
          echo "${{ secrets.SSH_KEY_INFERENCE }}" > ~/.ssh/id_inf && chmod 600 ~/.ssh/id_inf
          echo "${{ secrets.SSH_KEY_CORE_MCP_BRIDGES }}" > ~/.ssh/id_bridges && chmod 600 ~/.ssh/id_bridges
          echo "${{ secrets.SSH_KEY_COGNITIVEOS_DISTRO }}" > ~/.ssh/id_dist && chmod 600 ~/.ssh/id_dist
          ssh-add ~/.ssh/id_cpm ~/.ssh/id_cogd ~/.ssh/id_cli ~/.ssh/id_inf ~/.ssh/id_bridges ~/.ssh/id_dist
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build (Mock)
        run: make build-mock

      - name: Install Dependencies
        run: make build-dependencies

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

      - name: Test
        run: make test

      - name: Vet
        run: make lint

name: CI

on:
  push:
    branches: [development, main, "feature/*", "fix/*"]
  pull_request:
    branches: [development]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/coginfer

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        env:
          CGO_ENABLED: 0
        with:
          version: latest
          args: --timeout=3m

      - name: Test
        env:
          CGO_ENABLED: 0
        run: go test ./... -v -count=1

      - name: Vet
        env:
          CGO_ENABLED: 0
        run: go vet ./...

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build (CGo disabled — mock backend)
        run: CGO_ENABLED=0 go build -o build/bin/cognitiveos-inference ./cmd/coginfer && CGO_ENABLED=0 go build -o build/bin/cograw ./cmd/cograw

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

      - name: Test
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...
